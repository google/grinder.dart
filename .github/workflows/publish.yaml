# A CI configuration to auto-publish pub packages.

name: Publish

on:
  push:
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+*' ]

permissions: {}

jobs:
  publish:
    if: ${{ github.repository_owner == 'google' }}
    uses: dart-lang/ecosystem/.github/workflows/publish.yaml@848b3bf3b757d2e9ae4d60030eeed5756c87783f
